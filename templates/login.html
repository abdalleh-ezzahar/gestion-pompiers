<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RescueTrack – Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a1a; min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background: #2c2c2c; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; border-top: 4px solid #c0392b; }
    .login-title { color: #c0392b; font-weight: 800; font-size: 2rem; text-align:center; margin-bottom: 4px; }
    .login-sub { color: #aaa; text-align:center; margin-bottom: 28px; font-size:.9rem; }
    .form-control { background: #3a3a3a; border: 1px solid #555; color: #eee; }
    .form-control:focus { background: #3a3a3a; color: #eee; border-color: #c0392b; box-shadow: 0 0 0 .2rem rgba(192,57,43,.25); }
    label { color: #ccc; }
    .btn-login { background: #c0392b; border: none; width: 100%; padding: 10px; font-weight: 600; font-size: 1rem; color: white; }
    .btn-login:hover { background: #a93226; color:white; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">🚒 RescueTrack</div>
    <div class="login-sub">Système de gestion de caserne</div>
    {% if form.errors %}
    <div class="alert alert-danger py-2">Identifiants incorrects.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_username">Identifiant</label>
        <input type="text" name="username" id="id_username" class="form-control mt-1" placeholder="Votre identifiant" autofocus>
      </div>
      <div class="mb-4">
        <label for="id_password">Mot de passe</label>
        <input type="password" name="password" id="id_password" class="form-control mt-1" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-login">Se connecter</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
