{% extends 'core/base.html' %}
{% block title %}{{ title }} – RescueTrack{% endblock %}
{% block content %}
<div class="page-header">
  <h4 class="mb-0">{{ title }}</h4>
</div>
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-danger-rt">Enregistrer</button>
      <a href="{% url 'intervention_list' %}" class="btn btn-outline-secondary ms-2">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
